{{- if .Values.httpRoute.enabled -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.httpRoutename }}
spec:
  parentRefs:
  - name: {{ .Values.httpRoute.gatewayName }}
    namespace: envoy-gateway-system
    sectionName: {{ .Values.httpRoute.sectionName }}
  hostnames:
  {{- range .Values.httpRoute.hostnames }}
  - {{ . | quote }}
  {{- end }}
  rules:
  {{- range .Values.httpRoute.hosts }}
  - matches:
    {{- range .paths }}
    - path:
        type: {{ .pathType | default "PathPrefix" }}
        value: {{ .path }}
    {{- end }}
    {{- if .filters }}
    filters:
    {{- toYaml .filters | nindent 4 }}
    {{- end }}
    backendRefs:
    - name: {{ $.Values.httpRoute.backEndRefName }}
      port: {{ $.Values.service.port }}
  {{- end }}
{{- end }}
